<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — eBPLS BHD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/login.css">
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="7" r="3.5" stroke="#888" stroke-width="1.2"/>
          <path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="login-title">Admin Portal</div>
      <div class="login-subtitle">eBPLS BHD Clearance</div>
    </div>

    <div class="field-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>

    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span id="login-text">Sign in</span>
      <span id="login-spinner" class="spinner" hidden></span>
    </button>

    <div class="error-msg" id="error-msg"></div>
    <!-- <a href="../index.html" class="back-link">← Back to application form</a> -->
  </div>

  <script src="../config.js"></script>
  <script src="scripts/login.js"></script>
</body>
</html>
